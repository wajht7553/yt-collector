# ============================================================
# VIS2KNOW — Aerial Hazards Dataset Configuration
# ============================================================
# Run from the yt-collector/ folder:
#   python collect.py status
#   python collect.py download --class Floating_Debris --no-cookies
#   python collect.py review
# ============================================================

project:
  name: "Aerial Hazards Dataset"
  description: "Potential aerial hazards for aircraft and drones"
  target_per_class: 300
  resolution: 720
  max_duration_seconds: 3600  # Max video length in seconds
  browser: chrome  # chrome | edge | firefox (used for cookies-from-browser)
  cookies_file: "./cookies.txt"  # Path to cookies.txt
  enable_remote_components: true  # true/false; allow yt-dlp to fetch JS solver
  sleep_interval: [10, 20]  # Random sleep seconds per download [min, max]
  output_dir: "./data"  # Output directory path

classes:
  Floating_Debris:
    description: "Airborne objects carried by wind - potential engine/sensor hazards"
    keywords:
      core:
        - "plastic bag flying in air"
        - "plastic bag blowing in wind"
        - "balloon in sky"
        - "kite flying high altitude"
        - "sky lantern release"
      aviation:
        - "airborne debris wind"
        - "airborne debris aircraft hazard"
        - "foreign object debris FOD"
        - "balloon strike aircraft"
        - "kite near airport"
        - "debris in flight path"
      drone:
        - "drone encounter airborne debris"
        - "drone hits plastic bag"
        - "UAV obstacle avoidance flying object"
        - "drone collision debris mid air"
      pilot_view:
        - "cockpit view flying object"
        - "pilot sees debris"
        - "inflight object encounter"
      weather:
        - "debris flying storm wind"
        - "windblown debris tornado"
        - "plastic bag hurricane"
        - "trash flying high wind"
        - "garbage flying in air wind"
      detection:
        - "airborne object detection camera"
        - "sky object tracking"
      other:
        - "balloon released into sky"
        - "Chinese lantern flying"
        - "mylar balloon sky"
        - "trash bag wind carried"
        - "loose tarp blowing high"

  Hang_Gliders:
    description: "Unpowered gliding aircraft - airspace collision risk"
    keywords:
      core:
        - "hang glider flying"
        - "hang gliding flight"
        - "hang glider soaring"
        - "hang glider in sky"
        - "hang glider takeoff"
      aviation:
        - "hang glider near aircraft"
        - "hang glider airspace"
        - "hang glider airport vicinity"
        - "hang glider low altitude"
      drone:
        - "hang glider drone footage"
        - "drone sees hang glider"
        - "hang glider FPV drone"
        - "hang glider detected by drone"
        - "hang glider GoPro"
      detection:
        - "hang glider detection camera"
        - "hang glider tracking"
        - "hang glider spotted"
      viewpoint:
        - "hang glider from ground view"
        - "hang glider overhead"
        - "hang glider aerial view"
        - "hang glider bird eye view"
      multi:
        - "multiple hang gliders"
        - "hang gliding competition"
        - "hang glider formation"
        - "hang gliders thermal"
      conditions:
        - "hang gliding sunset"
        - "hang glider cloudy"
        - "hang glider mountains"
        - "hang glider windy conditions"
